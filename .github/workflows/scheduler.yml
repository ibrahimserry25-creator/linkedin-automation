name: LinkedIn Automation Scheduler

on:
  schedule:
    # Runs every 5 minutes
    - cron: '*/5 * * * *'
  workflow_dispatch:
    inputs:
      telegram_message:
        description: 'Direct message from Telegram Webhook'
        required: false
        default: ''

jobs:
  run-scheduler:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    env:
      TZ: 'Africa/Cairo'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create .env from GitHub Secrets
        run: |
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> .env
          echo "LINKEDIN_ACCESS_TOKEN=${{ secrets.LINKEDIN_ACCESS_TOKEN }}" >> .env
          echo "TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}" >> .env
          echo "TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}" >> .env
          echo "TELEGRAM_MESSAGE=${{ github.event.inputs.telegram_message }}" >> .env

      - name: Restore database from cache (persistent storage)
        uses: actions/cache@v4
        with:
          path: social_posts.db
          key: social-posts-db-${{ github.run_id }}
          restore-keys: |
            social-posts-db-

      - name: Initialize database (if new)
        run: python -c "from src.database import init_db; init_db()"

      - name: Run scheduler
        run: python standalone_scheduler.py
