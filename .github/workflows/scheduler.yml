name: LinkedIn Automation Scheduler

on:
  schedule:
    # Runs every 3 hours
    - cron: '0 */3 * * *'
  workflow_dispatch:
    inputs:
      telegram_message:
        description: 'Direct message from Telegram Webhook'
        required: false
        default: ''

jobs:
  run-scheduler:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      TZ: 'Africa/Cairo'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Create .env from GitHub Secrets
        run: |
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> .env
          echo "LINKEDIN_ACCESS_TOKEN=${{ secrets.LINKEDIN_ACCESS_TOKEN }}" >> .env
          echo "TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}" >> .env
          echo "TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}" >> .env
          echo "TELEGRAM_MESSAGE=${{ github.event.inputs.telegram_message }}" >> .env

      - name: Restore database from cache (persistent storage)
        uses: actions/cache@v4
        with:
          path: social_posts.db
          key: social-posts-db-${{ github.run_id }}
          restore-keys: |
            social-posts-db-

      - name: Initialize database (if new)
        run: python -c "from src.database import init_db; init_db()"

      - name: Restore LinkedIn session
        env:
          LINKEDIN_STATE_B64: ${{ secrets.LINKEDIN_STATE_B64 }}
        run: |
          if [ -n "$LINKEDIN_STATE_B64" ]; then
            echo "$LINKEDIN_STATE_B64" | base64 -d > src/linkedin_state.json
            echo "[*] LinkedIn state file restored from secret."
          else
            echo "[!] No LINKEDIN_STATE_B64 secret found. Scraping will require login."
          fi

      - name: Install xvfb
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: Run scheduler
        run: xvfb-run --auto-servernum --server-args="-screen 0 1280x1024x24" python standalone_scheduler.py

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-screenshots
          path: outputs/
          retention-days: 1
